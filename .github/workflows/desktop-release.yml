name: Desktop Release

on:
  release:
    types: [published, prereleased]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing Git tag/release to attach desktop assets to
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.event.release.tag_name || inputs.release_tag }}
  cancel-in-progress: false

jobs:
  release-context:
    name: Resolve release context
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      build_name: ${{ steps.meta.outputs.build_name }}
      build_number: ${{ steps.meta.outputs.build_number }}
      release_date: ${{ steps.meta.outputs.release_date }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            release_tag="${{ inputs.release_tag }}"
          else
            release_tag="${{ github.event.release.tag_name }}"
          fi

          version_line="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          build_name="${version_line%%+*}"
          build_number="${version_line##*+}"
          release_date="$(date -u +%F)"

          {
            echo "release_tag=$release_tag"
            echo "build_name=$build_name"
            echo "build_number=$build_number"
            echo "release_date=$release_date"
          } >> "$GITHUB_OUTPUT"

  verify:
    name: Verify tests
    runs-on: ubuntu-latest
    needs: release-context
    steps:
      - uses: actions/checkout@v4

      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test test

  build-linux:
    name: Build Linux Flatpak
    runs-on: ubuntu-latest
    needs: [release-context, verify]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            desktop-file-utils \
            flatpak \
            flatpak-builder \
            libgtk-3-dev \
            liblzma-dev \
            libsqlite3-dev \
            ninja-build \
            pkg-config

      - name: Configure Flathub remote
        run: sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Stamp AppStream release metadata
        shell: bash
        run: |
          perl -0pi -e 's#<release version="[^"]+" date="[^"]+" */>#<release version="${{ needs.release-context.outputs.build_name }}" date="${{ needs.release-context.outputs.release_date }}" />#' linux/packaging/org.lyricapp.sofar.metainfo.xml

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux app bundle
        run: flutter build linux --release --verbose

      - name: Package Flatpak bundle
        shell: bash
        run: |
          flatpak-builder \
            --force-clean \
            --install-deps-from=flathub \
            --repo=repo \
            build/flatpak-app \
            packaging/linux/flatpak/org.lyricapp.sofar.yaml
          flatpak build-bundle \
            repo \
            "sofar-hangolo-${{ needs.release-context.outputs.build_name }}-linux-x86_64.flatpak" \
            org.lyricapp.sofar

      - name: Upload Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-assets
          path: sofar-hangolo-${{ needs.release-context.outputs.build_name }}-linux-x86_64.flatpak
          if-no-files-found: error

