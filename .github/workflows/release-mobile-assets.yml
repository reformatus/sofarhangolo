name: Release Mobile Assets

on:
  push:
    tags: ["*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to attach mobile artifacts to
        required: true
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: release-mobile-${{ github.ref_name || inputs.release_tag }}
  cancel-in-progress: false

jobs:
  release-context:
    name: Resolve mobile release context
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_sha: ${{ steps.meta.outputs.release_sha }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            release_tag="${{ inputs.release_tag }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          git rev-parse "refs/tags/${release_tag}" >/dev/null
          release_sha="$(git rev-list -n 1 "${release_tag}")"

          prerelease=false
          if [[ "${release_tag%%+*}" == *-* ]]; then
            prerelease=true
          fi

          {
            echo "release_tag=$release_tag"
            echo "release_sha=$release_sha"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
            exit 0
          fi

          args=(--repo "$GITHUB_REPOSITORY" --title "$RELEASE_TAG" --notes "" --verify-tag)
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "$RELEASE_TAG" "${args[@]}"

  fetch-mobile-release-assets:
    name: Fetch mobile release assets from Codemagic
    runs-on: ubuntu-latest
    needs: release-context
    if: ${{ vars.CODEMAGIC_APP_ID != '' && vars.CODEMAGIC_MOBILE_WORKFLOW_ID != '' }}
    outputs:
      has_mobile_assets: ${{ steps.collect-mobile-assets.outputs.has_mobile_assets }}
    steps:
      - name: Wait for Codemagic mobile build
        env:
          CODEMAGIC_API_TOKEN: ${{ secrets.CODEMAGIC_API_TOKEN }}
          CODEMAGIC_APP_ID: ${{ vars.CODEMAGIC_APP_ID }}
          CODEMAGIC_MOBILE_WORKFLOW_ID: ${{ vars.CODEMAGIC_MOBILE_WORKFLOW_ID }}
          RELEASE_TAG: ${{ needs.release-context.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CODEMAGIC_API_TOKEN}" ]]; then
            echo "CODEMAGIC_API_TOKEN is not configured."
            printf '%s' '{"build":{"artefacts":[]}}' > build.json
            exit 0
          fi

          deadline=$(( $(date +%s) + 900 ))
          build_json=""

          while [[ $(date +%s) -lt $deadline ]]; do
            builds_json="$(curl -fsSL \
              -H "x-auth-token: ${CODEMAGIC_API_TOKEN}" \
              --get \
              --data-urlencode "appId=${CODEMAGIC_APP_ID}" \
              --data-urlencode "workflowId=${CODEMAGIC_MOBILE_WORKFLOW_ID}" \
              --data-urlencode "tag=${RELEASE_TAG}" \
              --data-urlencode "limit=20" \
              "https://api.codemagic.io/builds")"

            candidate_json="$(python -c 'import json,sys; data=json.loads(sys.argv[1]); builds=data.get("builds", []); print(json.dumps({"build": builds[0]}) if builds else "")' "$builds_json")"

            if [[ -z "$candidate_json" ]]; then
              sleep 20
              continue
            fi

            candidate_status="$(python -c 'import json,sys; build=json.loads(sys.argv[1]).get("build", {}); print(build.get("status", ""))' "$candidate_json")"

            if [[ "$candidate_status" == "finished" ]]; then
              build_json="$candidate_json"
              break
            fi

            sleep 20
          done

          if [[ -z "$build_json" ]]; then
            echo "Timed out waiting for Codemagic build for tag ${RELEASE_TAG}."
            exit 1
          fi

          printf '%s' "$build_json" > build.json

      - name: Download APK and IPA artifacts
        id: collect-mobile-assets
        env:
          CODEMAGIC_API_TOKEN: ${{ secrets.CODEMAGIC_API_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/mobile

          python - <<'PY'
          import json
          from pathlib import Path

          build = json.loads(Path("build.json").read_text(encoding="utf-8"))["build"]
          artifacts = build.get("artefacts", [])
          targets = []

          for artifact in artifacts:
              artifact_type = artifact.get("type")
              if artifact_type == "apk":
                  targets.append(
                      (artifact["url"], f'dist/mobile/sofar-hangolo-{build["tag"]}.apk')
                  )
              elif artifact_type == "ipa":
                  targets.append(
                      (artifact["url"], f'dist/mobile/sofar-hangolo-{build["tag"]}.ipa')
                  )

          Path("artifact_urls.txt").write_text(
              "".join(f"{url}\t{dest}\n" for url, dest in targets),
              encoding="utf-8",
          )
          PY

          if [[ ! -s artifact_urls.txt ]]; then
            echo "No APK or IPA artifacts found in Codemagic build."
            echo "has_mobile_assets=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while IFS=$'\t' read -r url destination; do
            [[ -n "$url" ]] || continue
            curl -fsSL \
              -H "x-auth-token: ${CODEMAGIC_API_TOKEN}" \
              "$url" \
              -o "$destination"
          done < artifact_urls.txt

          echo "has_mobile_assets=true" >> "$GITHUB_OUTPUT"

      - name: Upload mobile release assets
        if: ${{ steps.collect-mobile-assets.outputs.has_mobile_assets == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: mobile-release-assets
          path: dist/mobile/*
          if-no-files-found: error

  upload-mobile-release-assets:
    name: Upload mobile assets to GitHub release
    runs-on: ubuntu-latest
    needs: [release-context, fetch-mobile-release-assets]
    if: ${{ needs.fetch-mobile-release-assets.result == 'success' && needs.fetch-mobile-release-assets.outputs.has_mobile_assets == 'true' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mobile-release-assets
          path: dist/mobile

      - name: Upload mobile artifacts to the release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-context.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find dist/mobile -type f | sort)

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No mobile release assets were produced." >&2
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber --repo "$GITHUB_REPOSITORY"

  trigger-product-page-downloads:
    name: Trigger product page downloads update
    runs-on: ubuntu-latest
    needs: [release-context, fetch-mobile-release-assets, upload-mobile-release-assets]
    if: >-
      ${{
        always() &&
        github.event_name == 'push' &&
        needs.release-context.result == 'success' &&
        (needs.fetch-mobile-release-assets.result == 'success' || needs.fetch-mobile-release-assets.result == 'skipped') &&
        (needs.upload-mobile-release-assets.result == 'success' || needs.upload-mobile-release-assets.result == 'skipped')
      }}
    steps:
      - name: Wait for main release workflow
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-context.outputs.release_tag }}
          RELEASE_SHA: ${{ needs.release-context.outputs.release_sha }}
        shell: bash
        run: |
          set -euo pipefail

          deadline=$(( $(date +%s) + 1800 ))
          run_ok=false

          while [[ $(date +%s) -lt $deadline ]]; do
            release_runs="$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow "Release" \
              --json databaseId,headBranch,headSha,status,conclusion \
              --limit 20)"

            match="$(jq -r --arg tag "$RELEASE_TAG" --arg sha "$RELEASE_SHA" '.[] | select(.headBranch == $tag or .headSha == $sha) | @base64' <<<"$release_runs" | head -n 1)"
            if [[ -z "$match" ]]; then
              sleep 20
              continue
            fi

            status="$(printf '%s' "$match" | base64 --decode | jq -r '.status')"
            conclusion="$(printf '%s' "$match" | base64 --decode | jq -r '.conclusion')"
            if [[ "$status" == "completed" && "$conclusion" == "success" ]]; then
              run_ok=true
              break
            fi
            if [[ "$status" == "completed" && "$conclusion" != "success" ]]; then
              echo "Main release workflow completed with conclusion: $conclusion"
              exit 1
            fi

            sleep 20
          done

          if [[ "$run_ok" != "true" ]]; then
            echo "Timed out waiting for main release workflow for tag ${RELEASE_TAG}."
            exit 1
          fi

      - name: Trigger product page downloads workflow
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-context.outputs.release_tag }}
        run: |
          gh workflow run update-product-page-downloads.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$RELEASE_TAG" \
            -f release_tag="$RELEASE_TAG"
