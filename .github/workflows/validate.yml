name: Validate

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: write

concurrency:
  group: validate-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate code and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install validation dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test test

  build-pr-linux:
    name: Build PR Linux artifact
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libgtk-3-dev \
            libsqlite3-dev \
            ninja-build \
            pkg-config

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux app bundle
        run: flutter build linux --release

      - name: Package Linux tester artifact
        shell: bash
        run: |
          mkdir -p dist/pr
          tar -C build/linux/x64/release -czf \
            "dist/pr/sofar-hangolo-pr-${{ github.event.pull_request.number }}-linux-x64.tar.gz" \
            bundle

      - name: Upload Linux PR artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-linux-bundle
          path: dist/pr/*.tar.gz
          if-no-files-found: error

  build-pr-android:
    name: Build PR Android artifact
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android tester APK
        run: flutter build apk --debug

      - name: Stage Android tester artifact
        shell: bash
        run: |
          mkdir -p dist/pr
          cp build/app/outputs/flutter-apk/app-debug.apk \
            "dist/pr/sofar-hangolo-pr-${{ github.event.pull_request.number }}-android.apk"

      - name: Upload Android PR artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-android-apk
          path: dist/pr/*.apk
          if-no-files-found: error

  comment-pr-artifacts:
    name: Comment PR tester artifacts
    runs-on: ubuntu-latest
    needs: [validate, build-pr-linux, build-pr-android]
    if: >-
      ${{
        always() &&
        github.event_name == 'pull_request' &&
        needs.validate.result == 'success' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        (needs.build-pr-linux.result == 'success' || needs.build-pr-android.result == 'success')
      }}
    steps:
      - name: Publish or update PR artifact comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail

          artifacts_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts")"
          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          linux_url="$(jq -r --arg run "$GITHUB_RUN_ID" --arg repo "$GITHUB_REPOSITORY" '.artifacts[] | select(.name=="pr-linux-bundle") | "https://github.com/\($repo)/actions/runs/\($run)/artifacts/\(.id)"' <<<"$artifacts_json" | head -n 1)"
          android_url="$(jq -r --arg run "$GITHUB_RUN_ID" --arg repo "$GITHUB_REPOSITORY" '.artifacts[] | select(.name=="pr-android-apk") | "https://github.com/\($repo)/actions/runs/\($run)/artifacts/\(.id)"' <<<"$artifacts_json" | head -n 1)"

          cat > comment.md <<'EOF'
          <!-- pr-test-artifacts -->
          Test artifacts for this PR:
          EOF

          if [[ -n "$linux_url" ]]; then
            printf -- "- [Linux tester bundle](%s)\n" "$linux_url" >> comment.md
          fi

          if [[ -n "$android_url" ]]; then
            printf -- "- [Android tester APK](%s)\n" "$android_url" >> comment.md
          fi

          printf -- "- [Workflow run](%s)\n" "$run_url" >> comment.md

          existing_comment_id="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate --jq '.[] | select(.user.login=="github-actions[bot]" and (.body | contains("<!-- pr-test-artifacts -->"))) | .id' | head -n 1 || true)"
          payload="$(jq -Rs '{body: .}' < comment.md)"

          if [[ -n "$existing_comment_id" ]]; then
            printf '%s' "$payload" | gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${existing_comment_id}" --method PATCH --input -
          else
            printf '%s' "$payload" | gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --method POST --input -
          fi
