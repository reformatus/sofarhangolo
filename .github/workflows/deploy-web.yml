name: Deploy Web

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    name: Build web app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Prepare Drift web assets
        run: dart run tool/prepare_web.dart

      - name: Build Flutter web bundle
        run: flutter build web --release --base-href /web/

      - name: Finalize built web bundle
        run: dart run tool/finalize_web_build.dart

      - name: Upload web bundle
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          if-no-files-found: error

  deploy-web:
    name: Deploy to app.sofarkotta.hu
    runs-on: ubuntu-latest
    needs: build-web
    if: github.event_name != 'pull_request'
    env:
      TARGET_REPO: reformatus/app.sofarkotta.hu
      TARGET_BRANCH: main
      TARGET_DIR: docs/web
    steps:
      - name: Verify deploy key
        env:
          DEPLOY_KEY: ${{ secrets.APP_SOFARKOTTA_HU_DEPLOY_KEY }}
        run: |
          if [ -z "$DEPLOY_KEY" ]; then
            echo "Missing APP_SOFARKOTTA_HU_DEPLOY_KEY secret."
            exit 1
          fi

      - name: Download web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: ${{ runner.temp }}/web-build

      - name: Load deploy key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.APP_SOFARKOTTA_HU_DEPLOY_KEY }}

      - name: Trust GitHub SSH host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Clone target Pages repository
        run: |
          git clone \
            --branch "$TARGET_BRANCH" \
            "git@github.com:${TARGET_REPO}.git" \
            "${RUNNER_TEMP}/pages-repo"

      - name: Sync web bundle into Pages repository
        run: |
          mkdir -p "${RUNNER_TEMP}/pages-repo/${TARGET_DIR}"
          rsync -a --delete \
            "${RUNNER_TEMP}/web-build/" \
            "${RUNNER_TEMP}/pages-repo/${TARGET_DIR}/"

      - name: Commit deployment if needed
        working-directory: ${{ runner.temp }}/pages-repo
        run: |
          if [ -z "$(git status --short -- "${TARGET_DIR}")" ]; then
            echo "No web changes to deploy."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A "${TARGET_DIR}"
          git commit -m "Deploy lyric web from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push origin "$TARGET_BRANCH"
