name: Release

on:
  push:
    tags: ["*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to build and publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.release_tag }}
  cancel-in-progress: false

jobs:
  release-context:
    name: Resolve release context
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_ref: ${{ steps.meta.outputs.release_ref }}
      build_name: ${{ steps.meta.outputs.build_name }}
      build_number: ${{ steps.meta.outputs.build_number }}
      release_date: ${{ steps.meta.outputs.release_date }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            release_tag="${{ inputs.release_tag }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          git rev-parse "refs/tags/${release_tag}" >/dev/null
          release_ref="refs/tags/${release_tag}"

          version_line="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          build_name="${version_line%%+*}"
          build_number="${version_line##*+}"
          release_date="$(date -u +%F)"

          prerelease=false
          if [[ "${release_tag%%+*}" == *-* ]]; then
            prerelease=true
          fi

          {
            echo "release_tag=$release_tag"
            echo "release_ref=$release_ref"
            echo "build_name=$build_name"
            echo "build_number=$build_number"
            echo "release_date=$release_date"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
            exit 0
          fi

          args=(--repo "$GITHUB_REPOSITORY" --title "$RELEASE_TAG" --notes "" --verify-tag)
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "$RELEASE_TAG" "${args[@]}"

  verify:
    name: Verify release build
    runs-on: ubuntu-latest
    needs: release-context
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.release_ref }}

      - name: Install validation dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test test

  build-linux-release:
    name: Build Linux Flatpak
    runs-on: ubuntu-latest
    needs: [release-context, verify]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.release_ref }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            desktop-file-utils \
            flatpak \
            flatpak-builder \
            libgtk-3-dev \
            liblzma-dev \
            libsqlite3-dev \
            ninja-build \
            pkg-config

      - name: Configure Flathub remote
        run: flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Stamp AppStream release metadata
        shell: bash
        run: |
          perl -0pi -e 's#<release version="[^"]+" date="[^"]+" */>#<release version="${{ needs.release-context.outputs.build_name }}" date="${{ needs.release-context.outputs.release_date }}" />#' linux/packaging/org.lyricapp.sofar.metainfo.xml

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux app bundle
        run: flutter build linux --release --verbose

      - name: Package Flatpak bundle
        shell: bash
        run: |
          flatpak-builder \
            --force-clean \
            --user \
            --install-deps-from=flathub \
            --repo=repo \
            build/flatpak-app \
            packaging/linux/flatpak/org.lyricapp.sofar.yaml
          flatpak build-bundle \
            repo \
            "sofar-hangolo-${{ needs.release-context.outputs.build_name }}-linux-x86_64.flatpak" \
            org.lyricapp.sofar

      - name: Upload Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-assets
          path: sofar-hangolo-${{ needs.release-context.outputs.build_name }}-linux-x86_64.flatpak
          if-no-files-found: error

  build-windows-release:
    name: Build Windows installer and Store package
    runs-on: windows-latest
    needs: [release-context, verify]
    env:
      APP_VERSION: ${{ needs.release-context.outputs.build_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.release_ref }}

      - id: windows-store-ready
        name: Check Microsoft Store credentials
        shell: bash
        env:
          WINDOWS_STORE_TENANT_ID: ${{ secrets.WINDOWS_STORE_TENANT_ID }}
          WINDOWS_STORE_SELLER_ID: ${{ secrets.WINDOWS_STORE_SELLER_ID }}
          WINDOWS_STORE_CLIENT_ID: ${{ secrets.WINDOWS_STORE_CLIENT_ID }}
          WINDOWS_STORE_CLIENT_SECRET: ${{ secrets.WINDOWS_STORE_CLIENT_SECRET }}
        run: |
          if [[ -n "${{ vars.WINDOWS_STORE_APP_ID }}" && -n "${{ vars.WINDOWS_STORE_BETA_FLIGHT_ID }}" && -n "$WINDOWS_STORE_TENANT_ID" && -n "$WINDOWS_STORE_SELLER_ID" && -n "$WINDOWS_STORE_CLIENT_ID" && -n "$WINDOWS_STORE_CLIENT_SECRET" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows app
        run: flutter build windows --release

      - name: Build Microsoft Store MSIX
        run: dart run msix:create --store --build-windows false --output-path build/windows/msix --output-name sofar-hangolo-${{ needs.release-context.outputs.build_name }}-windows-store

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build native Windows installer
        shell: powershell
        run: |
          $env:APP_VERSION = "${{ needs.release-context.outputs.build_name }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "packaging\windows\sofar-hangolo.iss"

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: |
            build/windows/msix/*.msix
            build/windows/installer/*.exe
          if-no-files-found: error

      - name: Install Microsoft Store Developer CLI
        if: ${{ steps.windows-store-ready.outputs.ready == 'true' }}
        shell: powershell
        run: |
          winget install Microsoft.DotNet.DesktopRuntime.9 --accept-package-agreements --accept-source-agreements --silent
          winget install "Microsoft Store Developer CLI" --accept-package-agreements --accept-source-agreements --silent

      - name: Publish Windows beta to Microsoft Store
        if: ${{ steps.windows-store-ready.outputs.ready == 'true' }}
        shell: powershell
        env:
          WINDOWS_STORE_TENANT_ID: ${{ secrets.WINDOWS_STORE_TENANT_ID }}
          WINDOWS_STORE_SELLER_ID: ${{ secrets.WINDOWS_STORE_SELLER_ID }}
          WINDOWS_STORE_CLIENT_ID: ${{ secrets.WINDOWS_STORE_CLIENT_ID }}
          WINDOWS_STORE_CLIENT_SECRET: ${{ secrets.WINDOWS_STORE_CLIENT_SECRET }}
        run: |
          $storePackage = Get-ChildItem build/windows/msix/*.msix | Select-Object -First 1
          msstore reconfigure --tenantId "$env:WINDOWS_STORE_TENANT_ID" --sellerId "$env:WINDOWS_STORE_SELLER_ID" --clientId "$env:WINDOWS_STORE_CLIENT_ID" --clientSecret "$env:WINDOWS_STORE_CLIENT_SECRET"
          msstore publish . --inputFile "$($storePackage.FullName)" --appId "${{ vars.WINDOWS_STORE_APP_ID }}" --flightId "${{ vars.WINDOWS_STORE_BETA_FLIGHT_ID }}"

  build-macos-release:
    name: Build macOS DMG and App Store package
    runs-on: macos-latest
    needs: [release-context, verify]
    outputs:
      app_store_ready: ${{ steps.app-store-ready.outputs.ready }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.release_ref }}

      - id: developer-id-ready
        name: Check direct-distribution signing credentials
        shell: bash
        env:
          MACOS_DEVELOPER_ID_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          MACOS_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
          MACOS_DEVELOPER_ID_APPLICATION: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION }}
        run: |
          if [[ -n "$MACOS_DEVELOPER_ID_P12_BASE64" && -n "$MACOS_DEVELOPER_ID_P12_PASSWORD" && -n "$MACOS_DEVELOPER_ID_APPLICATION" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - id: notary-ready
        name: Check notarization credentials
        shell: bash
        env:
          MACOS_NOTARY_API_KEY_ID: ${{ secrets.MACOS_NOTARY_API_KEY_ID }}
          MACOS_NOTARY_API_ISSUER_ID: ${{ secrets.MACOS_NOTARY_API_ISSUER_ID }}
          MACOS_NOTARY_API_KEY_BASE64: ${{ secrets.MACOS_NOTARY_API_KEY_BASE64 }}
        run: |
          if [[ "${{ steps.developer-id-ready.outputs.ready }}" == "true" && -n "$MACOS_NOTARY_API_KEY_ID" && -n "$MACOS_NOTARY_API_ISSUER_ID" && -n "$MACOS_NOTARY_API_KEY_BASE64" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - id: app-store-ready
        name: Check App Store credentials
        shell: bash
        env:
          MACOS_APP_STORE_CERTIFICATES_P12_BASE64: ${{ secrets.MACOS_APP_STORE_CERTIFICATES_P12_BASE64 }}
          MACOS_APP_STORE_CERTIFICATES_P12_PASSWORD: ${{ secrets.MACOS_APP_STORE_CERTIFICATES_P12_PASSWORD }}
          MACOS_APP_STORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_APP_STORE_PROVISIONING_PROFILE_BASE64 }}
          MACOS_APP_STORE_API_KEY_ID: ${{ secrets.MACOS_APP_STORE_API_KEY_ID }}
          MACOS_APP_STORE_API_ISSUER_ID: ${{ secrets.MACOS_APP_STORE_API_ISSUER_ID }}
          MACOS_APP_STORE_API_KEY_BASE64: ${{ secrets.MACOS_APP_STORE_API_KEY_BASE64 }}
        run: |
          if [[ -n "${{ vars.MACOS_APP_BUNDLE_ID }}" && -n "${{ vars.MACOS_APPLE_TEAM_ID }}" && -n "${{ vars.MACOS_APP_STORE_PROFILE_NAME }}" && -n "$MACOS_APP_STORE_CERTIFICATES_P12_BASE64" && -n "$MACOS_APP_STORE_CERTIFICATES_P12_PASSWORD" && -n "$MACOS_APP_STORE_PROVISIONING_PROFILE_BASE64" && -n "$MACOS_APP_STORE_API_KEY_ID" && -n "$MACOS_APP_STORE_API_ISSUER_ID" && -n "$MACOS_APP_STORE_API_KEY_BASE64" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install macOS CocoaPods dependencies
        run: cd macos && pod update sqlite3 --repo-update

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Refresh Flutter macOS build environment
        shell: bash
        run: |
          mkdir -p macos/Flutter/ephemeral
          cat > macos/Flutter/ephemeral/Flutter-Generated.xcconfig <<EOF
          FLUTTER_ROOT=${FLUTTER_ROOT}
          FLUTTER_APPLICATION_PATH=${GITHUB_WORKSPACE}
          COCOAPODS_PARALLEL_CODE_SIGN=true
          FLUTTER_BUILD_DIR=build
          FLUTTER_BUILD_NAME=${{ needs.release-context.outputs.build_name }}
          FLUTTER_BUILD_NUMBER=${{ needs.release-context.outputs.build_number }}
          DART_OBFUSCATION=false
          TRACK_WIDGET_CREATION=true
          TREE_SHAKE_ICONS=false
          PACKAGE_CONFIG=.dart_tool/package_config.json
          EOF
          : > macos/Flutter/ephemeral/FlutterInputs.xcfilelist
          : > macos/Flutter/ephemeral/FlutterOutputs.xcfilelist
          cat > macos/Flutter/ephemeral/flutter_export_environment.sh <<EOF
          #!/bin/sh
          export "FLUTTER_ROOT=${FLUTTER_ROOT}"
          export "FLUTTER_APPLICATION_PATH=${GITHUB_WORKSPACE}"
          export "COCOAPODS_PARALLEL_CODE_SIGN=true"
          export "FLUTTER_BUILD_DIR=build"
          export "FLUTTER_BUILD_NAME=${{ needs.release-context.outputs.build_name }}"
          export "FLUTTER_BUILD_NUMBER=${{ needs.release-context.outputs.build_number }}"
          export "DART_OBFUSCATION=false"
          export "TRACK_WIDGET_CREATION=true"
          export "TREE_SHAKE_ICONS=false"
          export "PACKAGE_CONFIG=.dart_tool/package_config.json"
          EOF
          chmod +x macos/Flutter/ephemeral/flutter_export_environment.sh

      - name: Build unsigned macOS app
        shell: bash
        run: |
          xcodebuild \
            -workspace macos/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath build/macos/derived_data \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build
          mkdir -p build/macos/Build/Products
          rm -rf build/macos/Build/Products/Release
          cp -R build/macos/derived_data/Build/Products/Release build/macos/Build/Products/Release

      - name: Import Developer ID certificate
        if: ${{ steps.developer-id-ready.outputs.ready == 'true' }}
        env:
          DEV_ID_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          DEV_ID_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/release.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          echo "$DEV_ID_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/developer-id.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/developer-id.p12" -P "$DEV_ID_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Sign macOS app for direct distribution
        if: ${{ steps.developer-id-ready.outputs.ready == 'true' }}
        run: |
          APP_PATH="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -print -quit)"
          codesign \
            --deep \
            --force \
            --options runtime \
            --entitlements macos/Runner/DirectDistribution.entitlements \
            --sign "${{ secrets.MACOS_DEVELOPER_ID_APPLICATION }}" \
            "$APP_PATH"

      - name: Verify macOS direct-distribution entitlements
        if: ${{ steps.developer-id-ready.outputs.ready == 'true' }}
        run: |
          APP_PATH="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -print -quit)"
          codesign -d --entitlements :- "$APP_PATH" > "$RUNNER_TEMP/direct-distribution-entitlements.plist"
          grep -q 'applinks:app.sofarhangolo.hu' "$RUNNER_TEMP/direct-distribution-entitlements.plist"

      - name: Build DMG
        run: |
          APP_PATH="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -print -quit)"
          bash tool/build_macos_dmg.sh "$APP_PATH" "build/macos/Sofar-Hangolo-${{ needs.release-context.outputs.build_name }}-macos.dmg"

      - name: Write notarization API key
        if: ${{ steps.notary-ready.outputs.ready == 'true' }}
        env:
          NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_API_KEY_ID }}
          NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$NOTARY_KEY_BASE64" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${NOTARY_KEY_ID}.p8"

      - name: Notarize DMG
        if: ${{ steps.notary-ready.outputs.ready == 'true' }}
        env:
          NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_API_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_API_ISSUER_ID }}
        run: |
          DMG_PATH="build/macos/Sofar-Hangolo-${{ needs.release-context.outputs.build_name }}-macos.dmg"
          xcrun notarytool submit "$DMG_PATH" \
            --key "$HOME/.appstoreconnect/private_keys/AuthKey_${NOTARY_KEY_ID}.p8" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG_PATH"

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-assets
          path: build/macos/*.dmg
          if-no-files-found: error

      - name: Import App Store certificates
        if: ${{ steps.app-store-ready.outputs.ready == 'true' }}
        env:
          APP_STORE_P12_BASE64: ${{ secrets.MACOS_APP_STORE_CERTIFICATES_P12_BASE64 }}
          APP_STORE_P12_PASSWORD: ${{ secrets.MACOS_APP_STORE_CERTIFICATES_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-store.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          echo "APP_STORE_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "APP_STORE_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          echo "$APP_STORE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/app-store.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/app-store.p12" -P "$APP_STORE_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install App Store provisioning profile
        if: ${{ steps.app-store-ready.outputs.ready == 'true' }}
        env:
          APP_STORE_PROFILE_BASE64: ${{ secrets.MACOS_APP_STORE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$APP_STORE_PROFILE_BASE64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/${{ vars.MACOS_APP_BUNDLE_ID }}.provisionprofile"

      - name: Write App Store Connect API key
        if: ${{ steps.app-store-ready.outputs.ready == 'true' }}
        env:
          APP_STORE_API_KEY_ID: ${{ secrets.MACOS_APP_STORE_API_KEY_ID }}
          APP_STORE_API_KEY_BASE64: ${{ secrets.MACOS_APP_STORE_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_API_KEY_BASE64" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_API_KEY_ID}.p8"

      - name: Archive macOS App Store build
        if: ${{ steps.app-store-ready.outputs.ready == 'true' }}
        run: |
          bash tool/render_macos_appstore_export_options.sh \
            "$RUNNER_TEMP/exportOptions.plist" \
            "${{ vars.MACOS_APPLE_TEAM_ID }}" \
            "${{ vars.MACOS_APP_BUNDLE_ID }}" \
            "${{ vars.MACOS_APP_STORE_PROFILE_NAME }}"
          xcodebuild \
            -workspace macos/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ vars.MACOS_APPLE_TEAM_ID }}" \
            PRODUCT_BUNDLE_IDENTIFIER="${{ vars.MACOS_APP_BUNDLE_ID }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ vars.MACOS_APP_STORE_PROFILE_NAME }}"
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist" \
            -exportPath "$RUNNER_TEMP/app-store"

      - name: Verify macOS App Store entitlements
        if: ${{ steps.app-store-ready.outputs.ready == 'true' }}
        run: |
          APP_PATH="$(find "$RUNNER_TEMP/Runner.xcarchive/Products/Applications" -maxdepth 1 -name '*.app' -print -quit)"
          codesign -d --entitlements :- "$APP_PATH" > "$RUNNER_TEMP/app-store-entitlements.plist"
          grep -q 'applinks:app.sofarhangolo.hu' "$RUNNER_TEMP/app-store-entitlements.plist"

      - name: Upload App Store package artifact
        if: ${{ steps.app-store-ready.outputs.ready == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-store-package
          path: ${{ runner.temp }}/app-store/*.pkg
          if-no-files-found: error

      - name: Publish macOS beta to App Store Connect
        if: ${{ steps.app-store-ready.outputs.ready == 'true' }}
        env:
          APP_STORE_API_KEY_ID: ${{ secrets.MACOS_APP_STORE_API_KEY_ID }}
          APP_STORE_API_ISSUER_ID: ${{ secrets.MACOS_APP_STORE_API_ISSUER_ID }}
        run: |
          PKG_PATH="$(find "$RUNNER_TEMP/app-store" -maxdepth 1 -name '*.pkg' -print -quit)"
          xcrun altool --upload-app --file "$PKG_PATH" --type osx --apiKey "$APP_STORE_API_KEY_ID" --apiIssuer "$APP_STORE_API_ISSUER_ID"

  build-web-release:
    name: Build web bundle
    runs-on: ubuntu-latest
    needs: [release-context, verify]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.release_ref }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Prepare Drift web assets
        run: dart run tool/prepare_web.dart

      - name: Build Flutter web bundle
        run: flutter build web --release --base-href /web/

      - name: Finalize built web bundle
        run: dart run tool/finalize_web_build.dart

      - name: Upload web release bundle
        uses: actions/upload-artifact@v4
        with:
          name: web-release-build
          path: build/web
          if-no-files-found: error

  upload-release-assets:
    name: Upload assets to GitHub release
    runs-on: ubuntu-latest
    needs: [release-context, build-linux-release, build-windows-release, build-macos-release]
    if: ${{ always() && needs.release-context.result == 'success' }}
    steps:
      - uses: actions/download-artifact@v4
        if: ${{ needs.build-linux-release.result == 'success' }}
        with:
          name: linux-release-assets
          path: dist/linux

      - uses: actions/download-artifact@v4
        if: ${{ needs.build-windows-release.result == 'success' }}
        with:
          name: windows-release-assets
          path: dist/windows

      - uses: actions/download-artifact@v4
        if: ${{ needs.build-macos-release.result == 'success' }}
        with:
          name: macos-release-assets
          path: dist/macos

      - uses: actions/download-artifact@v4
        if: ${{ needs.build-macos-release.result == 'success' && needs.build-macos-release.outputs.app_store_ready == 'true' }}
        with:
          name: macos-app-store-package
          path: dist/macos-app-store

      - name: Upload installers to the release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-context.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find dist -type f | sort)

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No release assets were produced." >&2
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber --repo "$GITHUB_REPOSITORY"

  deploy-web:
    name: Deploy web to app.sofarhangolo.hu
    runs-on: ubuntu-latest
    needs: [release-context, build-web-release]
    if: ${{ needs.build-web-release.result == 'success' && needs.release-context.outputs.prerelease != 'true' }}
    env:
      TARGET_REPO: reformatus/app.sofarhangolo.hu
      TARGET_BRANCH: main
      TARGET_DIR: docs/web
    steps:
      - id: release-web-ready
        name: Check release deploy eligibility
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-context.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail

          release_json="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json isPrerelease 2>/dev/null || true)"
          if [[ -z "$release_json" ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          is_prerelease="$(jq -r '.isPrerelease' <<<"$release_json")"
          if [[ "$is_prerelease" == "true" ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - id: deploy-key-ready
        name: Check deploy key
        env:
          DEPLOY_KEY: ${{ secrets.APP_SOFARHANGOLO_HU_DEPLOY_KEY }}
        run: |
          if [ -z "$DEPLOY_KEY" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download web bundle
        if: ${{ steps.release-web-ready.outputs.ready == 'true' && steps.deploy-key-ready.outputs.ready == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: web-release-build
          path: ${{ runner.temp }}/web-build

      - name: Load deploy key
        if: ${{ steps.release-web-ready.outputs.ready == 'true' && steps.deploy-key-ready.outputs.ready == 'true' }}
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.APP_SOFARHANGOLO_HU_DEPLOY_KEY }}

      - name: Trust GitHub SSH host key
        if: ${{ steps.release-web-ready.outputs.ready == 'true' && steps.deploy-key-ready.outputs.ready == 'true' }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Clone target Pages repository
        if: ${{ steps.release-web-ready.outputs.ready == 'true' && steps.deploy-key-ready.outputs.ready == 'true' }}
        run: |
          git clone \
            --branch "$TARGET_BRANCH" \
            "git@github.com:${TARGET_REPO}.git" \
            "${RUNNER_TEMP}/pages-repo"

      - name: Sync web bundle into Pages repository
        if: ${{ steps.release-web-ready.outputs.ready == 'true' && steps.deploy-key-ready.outputs.ready == 'true' }}
        run: |
          mkdir -p "${RUNNER_TEMP}/pages-repo/${TARGET_DIR}"
          rsync -a --delete \
            "${RUNNER_TEMP}/web-build/" \
            "${RUNNER_TEMP}/pages-repo/${TARGET_DIR}/"

      - name: Commit deployment if needed
        if: ${{ steps.release-web-ready.outputs.ready == 'true' && steps.deploy-key-ready.outputs.ready == 'true' }}
        working-directory: ${{ runner.temp }}/pages-repo
        run: |
          if [ -z "$(git status --short -- "${TARGET_DIR}")" ]; then
            echo "No web changes to deploy."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A "${TARGET_DIR}"
          git commit -m "Deploy lyric web from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push origin "$TARGET_BRANCH"
